# ── PostgreSQL RDS Connection ──────────────────────────────────────────────
# ${VAR:default} means: read from environment variable, use 'default' if not set
spring.datasource.url=jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate Settings ───────────────────────────────────────────────
# update  = creates/alters tables automatically on app startup
spring.jpa.hibernate.ddl-auto=update

# show-sql = prints every SQL query to the console (useful for learning/debugging)
spring.jpa.show-sql=true

# Tell Hibernate to generate PostgreSQL-compatible SQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Server Port ────────────────────────────────────────────────────────────
server.port=8080
server.address=0.0.0.0
