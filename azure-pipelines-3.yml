# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
  branches:
    include:
      - master

pr: none

parameters:
  - name: action
    displayName: "Type action: start | destroy"
    type: string
    default: start

pool:
  vmImage: ubuntu-latest

steps:

# =========================
# Checkout Code
# =========================
- checkout: self

# =========================
# Show Repo Structure
# =========================
- script: |
    ls -R
  displayName: "Show Repo Structure"

# =========================
# AWS Credentials
# =========================
- script: |
    export AWS_ACCESS_KEY_ID=$(AWS_ACCESS_KEY_ID)
    export AWS_SECRET_ACCESS_KEY=$(AWS_SECRET_ACCESS_KEY)
    export AWS_DEFAULT_REGION=ap-south-1
  displayName: "Set AWS Credentials"
  env:
    AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
    AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)

# =========================
# Setup Terraform
# =========================
- task: TerraformInstaller@1
  displayName: "Install Terraform"
  inputs:
    terraformVersion: 'latest'

# =========================
# Clean Terraform Cache
# =========================
- script: |
    rm -rf .terraform
    rm -f .terraform.lock.hcl
  displayName: "Clean Terraform Cache"

# =========================
# Terraform Init
# =========================
- script: |
    terraform init
  displayName: "Terraform Init"
  env:
    AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
    AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)

# =========================
# Terraform Validate
# =========================
- script: |
    terraform plan
  displayName: "Terraform Plan"
  condition: eq('${{ parameters.action }}', 'start')
  env:
    AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
    AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
    AWS_DEFAULT_REGION: ap-south-1

# =========================
# Terraform Plan (START only)
# =========================
- script: |
    terraform plan
  displayName: "Terraform Plan"
  condition: eq('${{ parameters.action }}', 'start')
  env:
    AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
    AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
    AWS_DEFAULT_REGION: ap-south-1

# =========================
# Terraform Apply (START)
# =========================
- script: |
    terraform apply -auto-approve
  displayName: "Terraform Apply"
  condition: eq('${{ parameters.action }}', 'start')
  env:
    AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
    AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
    AWS_DEFAULT_REGION: ap-south-1

# =========================
# Debug State Info
# =========================
- script: |
    echo "Checking terraform files..."
    ls -R
    echo "Terraform state info"
    cat terraform.tfstate || echo "No local state file (using backend)"
  displayName: "Show State Debug Info"

# =========================
# Terraform Destroy
# =========================
- script: |
    terraform destroy -auto-approve
  displayName: "Terraform Destroy"
  condition: eq('${{ parameters.action }}', 'destroy')
  env:
    AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
    AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
    AWS_DEFAULT_REGION: ap-south-1
